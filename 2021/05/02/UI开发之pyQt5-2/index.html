<!-- 每个控件的具体属性还是分开讲，并且要先讲控件再讲布局
### 文本显示类控件
#### 单行编辑框（QLineEdit）

单行编辑框一般是用来输入用户名或密码等简要内容的，其写法如下：
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"><span class="keyword">from</span> PyQt5.QtWidgets <span class="keyword">import</span> QMainWindow, QApplication, QLineEdit, QVBoxLayout, QWidget</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">MainWindow</span><span class="params">(QMainWindow)</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self, parent=None)</span>:</span></span><br><span class="line">        super(MainWindow, self).__init__(parent)   </span><br><span class="line">        self.init_ui()</span><br><span class="line">        self.show()</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">init_ui</span><span class="params">(self)</span>:</span></span><br><span class="line">        self.setGeometry(<span class="number">1000</span>, <span class="number">400</span>, <span class="number">300</span>, <span class="number">300</span>)</span><br><span class="line">        self.setWindowTitle(<span class="string">"主窗口"</span>)</span><br><span class="line"></span><br><span class="line">        main_widget = QWidget()</span><br><span class="line">        main_layout = QVBoxLayout()</span><br><span class="line">        main_widget.setLayout(main_layout)</span><br><span class="line">        line_edit1 = QLineEdit()</span><br><span class="line">        line_edit1.setPlaceholderText(<span class="string">"用户名"</span>)</span><br><span class="line">        line_edit2 = QLineEdit()</span><br><span class="line">        line_edit2.setPlaceholderText(<span class="string">"密码"</span>)</span><br><span class="line">        main_layout.addWidget(line_edit1)</span><br><span class="line">        main_layout.addWidget(line_edit2)</span><br><span class="line"></span><br><span class="line">        self.setCentralWidget(main_widget)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">"__main__"</span>:</span><br><span class="line">    app = QApplication(sys.argv[<span class="number">1</span>:])</span><br><span class="line"></span><br><span class="line">    window = MainWindow()</span><br><span class="line">    window.show()</span><br><span class="line"></span><br><span class="line">    sys.exit(app.exec_())</span><br></pre></td></tr></table></figure>
<p>其中创建了一个主控件<code>main_widget</code>用来显示其他控件，使用<code>setCentralWidget(main_widget)</code>可以设置为主窗口<code>QMainWindow</code>的主控件，该控件使用了垂直布局方式<code>QVBoxlayout</code>，其中包含两个文本编辑子控件。<code>QLineEdit</code>可以设置的一些属性：</p>
<ul>
<li><code>setPlaceholderText(a0: str)</code>：<ul>
<li>提示内容，输入时会覆盖</li>
</ul>
</li>
<li><code>setText(self, atext: str)</code>：<ul>
<li>设置文本显示的内容</li>
</ul>
</li>
<li><code>setMaxLength(self, a0: int)</code></li>
<li><code>setEchoMode(self, a0: &#39;QLineEdit.EchoMode&#39;)</code><ul>
<li>输入文本不可见，一般用在输入密码时保护隐私，以小圆点替代输入的文本来显示</li>
</ul>
</li>
<li><code>setAlignment(self, flag: typing.Union[QtCore.Qt.Alignment, QtCore.Qt.AlignmentFlag])</code><ul>
<li>文本的显示对齐方式，有居中对齐，左对齐，右对齐等</li>
</ul>
</li>
<li><code>setReadOnly(self, a0: bool)</code><ul>
<li>可知设置为只读模式，这时不能编辑<br>—&gt;</li>
</ul>
</li>
</ul>
